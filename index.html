<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GamerDex - Encuentra tus Videojuegos Favoritos</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="GamerDex es la base de datos definitiva para buscar videojuegos, comparar precios en tiendas y encontrar alternativas gratuitas del mismo género.">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css?v=1.0.5">
</head>
<body class="flex flex-col justify-between min-h-screen">

  <!-- Header -->
  <header class="w-full py-4 px-6 md:px-12 glass-panel border-b border-slate-800/60 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-3 group">
        <div class="w-9 h-9 rounded-lg bg-gradient-gamer flex items-center justify-center text-white text-lg font-bold group-hover:scale-105 transition-transform duration-300">
          <i class="fa-solid fa-gamepad"></i>
        </div>
        <span class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-fuchsia-500 font-gamer">
          GAMER<span class="text-white group-hover:text-sky-400 transition-colors duration-300">DEX</span>
        </span>
      </a>
      <div class="flex items-center space-x-4">
        <a href="https://github.com/XLN-GLR/GamerDex" target="_blank" class="text-gray-400 hover:text-sky-400 transition-colors duration-300 text-lg">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>
  </header>

  <!-- Hero Highlight / Banner Dinámico de Inicio -->
  <section id="hero-highlight" class="w-full h-[35vh] md:h-[45vh] bg-cover bg-center relative flex items-end justify-start border-b border-slate-800/40">
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/70 to-transparent"></div>
    <div class="max-w-7xl mx-auto w-full px-6 md:px-12 pb-6 md:pb-10 relative z-10">
      <div class="max-w-2xl">
        <div id="hero-tag" class="inline-block px-2.5 py-0.5 text-[10px] rounded bg-sky-500/10 text-sky-400 border border-sky-500/20 mb-2 font-bold uppercase tracking-wider">
          Destacado en Tendencia
        </div>
        <h1 id="hero-title" class="text-3xl md:text-5xl font-black text-white font-gamer leading-tight mb-2 uppercase">
          Portal 2
        </h1>
        <p id="hero-desc" class="text-gray-400 text-sm md:text-base line-clamp-2 mb-4 leading-relaxed">
          Cargando juego destacado del día...
        </p>
        <button id="hero-btn-details" class="px-5 py-2 text-xs font-bold uppercase tracking-wider rounded-lg bg-gradient-gamer text-white hover:scale-105 transition-all shadow-md">
          Ver Ficha Técnica <i class="fa-solid fa-circle-arrow-right ml-1"></i>
        </button>
      </div>
    </div>
  </section>

  <!-- Search & Main Area -->
  <main class="flex-grow max-w-7xl mx-auto w-full px-6 md:px-12 py-12 relative z-10">
    
    <!-- Contenedor del Buscador (Centrado y sobrio) -->
    <div class="max-w-2xl mx-auto mb-16 relative">
      <form id="search-form" class="relative">
        <div class="relative flex items-center">
          <span class="absolute left-4 text-gray-500">
            <i class="fa-solid fa-gamepad"></i>
          </span>
          <input 
            type="text" 
            id="search-input" 
            placeholder="Escribe el nombre del juego (ej: Batman, Portal, GTA...)" 
            class="w-full py-3.5 pl-11 pr-16 bg-slate-950/90 border border-slate-800 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-sky-500 transition-all duration-300 text-sm md:text-base"
            required
            autocomplete="off"
          >
          <button 
            type="submit" 
            id="search-btn"
            class="absolute right-2 px-4 py-2 rounded-lg bg-slate-900 border border-slate-800 text-gray-300 hover:text-sky-400 hover:border-sky-500/30 transition-all flex items-center justify-center font-bold"
            aria-label="Buscar"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>

        <!-- Autocomplete Dropdown -->
        <div id="autocomplete-results" class="hidden absolute top-full left-0 right-0 mt-1 max-h-72 overflow-y-auto glass-panel border border-sky-500/20 rounded-xl shadow-lg z-50 text-left">
          <!-- Sugerencias inyectadas dinámicamente -->
        </div>

        <!-- Error Container (Hidden by default) -->
        <div id="error-message" class="hidden mt-3 text-red-400 text-xs flex items-center justify-center space-x-2 bg-red-950/20 border border-red-500/20 py-2 px-3 rounded-lg">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="error-text"></span>
        </div>
      </form>
    </div>

    <!-- SECCIONES DE CATÁLOGO (CATALOG CARDS GRIDS) -->
    <div class="space-y-16">
      
      <!-- Sección 1: Catálogo por Categorías -->
      <section>
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 border-b border-slate-800/40 pb-3 gap-4">
          <h2 class="text-xl md:text-2xl font-bold font-gamer text-white uppercase flex items-center">
            <span class="w-1.5 h-6 bg-sky-500 rounded mr-3"></span> Catálogo de Juegos
          </h2>
          <!-- Pestañas de categorías -->
          <div class="flex items-center space-x-2 overflow-x-auto pb-2 md:pb-0 scrollbar-none" id="category-tabs">
            <button data-genre="action" class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase bg-sky-500 text-white shadow-md transition-all whitespace-nowrap cursor-pointer">Acción</button>
            <button data-genre="role-playing-games-rpg" class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase bg-slate-900 border border-slate-800 text-gray-400 hover:text-white transition-all whitespace-nowrap cursor-pointer">RPG</button>
            <button data-genre="strategy" class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase bg-slate-900 border border-slate-800 text-gray-400 hover:text-white transition-all whitespace-nowrap cursor-pointer">Estrategia</button>
            <button data-genre="platformer" class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase bg-slate-900 border border-slate-800 text-gray-400 hover:text-white transition-all whitespace-nowrap cursor-pointer">Plataformas</button>
            <button data-genre="shooter" class="px-4 py-1.5 rounded-lg text-xs font-bold uppercase bg-slate-900 border border-slate-800 text-gray-400 hover:text-white transition-all whitespace-nowrap cursor-pointer">Shooter</button>
          </div>
        </div>
        
        <!-- Spinner de carga del catálogo -->
        <div id="loading-catalog" class="py-12 flex flex-col items-center justify-center">
          <div class="w-10 h-10 border-4 border-slate-800 rounded-full animate-spin-neon mb-2"></div>
          <span class="text-xs text-gray-500 font-gamer uppercase tracking-widest">Cargando juegos...</span>
        </div>
        
        <!-- Grid del Catálogo de Categorías -->
        <div id="catalog-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <!-- Tarjetas inyectadas por JS -->
        </div>
      </section>

      <!-- Sección 3: Alternativas Gratuitas Populares -->
      <section>
        <div class="flex items-center justify-between mb-6 border-b border-slate-800/40 pb-3">
          <h2 class="text-xl md:text-2xl font-bold font-gamer text-white uppercase flex items-center">
            <span class="w-1.5 h-6 bg-emerald-500 rounded mr-3"></span> Gratuitos Destacados
          </h2>
          <span class="text-xs text-emerald-400 font-semibold uppercase tracking-wider">Alternativas Free-To-Play</span>
        </div>
        
        <!-- Spinner de carga -->
        <div id="loading-free" class="py-12 flex flex-col items-center justify-center">
          <div class="w-10 h-10 border-4 border-slate-800 rounded-full animate-spin-neon mb-2"></div>
          <span class="text-xs text-gray-500 font-gamer uppercase tracking-widest">Cargando gratuitos...</span>
        </div>
        
        <!-- Grid de Juegos Gratuitos -->
        <div id="free-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <!-- Tarjetas inyectadas por JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-5 px-6 glass-panel border-t border-slate-800/40 text-center text-xs text-gray-500 relative z-10 mt-16">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
      <p>&copy; 2026 GamerDex. Proyecto Académico de Integración de APIs Asíncronas.</p>
    </div>
  </footer>

  <!-- App Main Logic -->
  <script src="main.js?v=1.0.5"></script>
</body>
</html>
